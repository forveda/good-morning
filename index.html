<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🌸</title>

<style>
body {
  margin:0;
  padding:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg, #ffd6e0, #ffe6f0, #ffd1dc, #ffe4ec);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  overflow:hidden;
}

@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.box {
  background:white;
  padding:35px;
  border-radius:20px;
  width:85%;
  max-width:420px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  z-index:2;
}

h2 {
  color:#ff4d88;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #ff99bb; }
  to { text-shadow: 0 0 15px #ff4d88; }
}

#text p {
  opacity:0;
  transform: translateY(15px);
  transition: all 0.6s ease;
  margin:12px 0;
  color:#444;
  line-height:1.7;
}

.show {
  opacity:1 !important;
  transform: translateY(0) !important;
}

.highlight {
  color:#ff4d88;
  font-weight:bold;
  font-size:18px;
}

button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:#ff4d88;
  color:white;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
  transition:0.3s;
}

button:hover {
  transform: scale(1.05);
}

.heart {
  position:absolute;
  color:#ff4d88;
  font-size:20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}
</style>

</head>

<body>

<div class="box">
  <h2>Good Morning ☀️</h2>
  <div id="text"></div>
  <button id="btn" onclick="showMessage()">Open 💌</button>
</div>

<!-- Music -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
function showMessage() {

document.getElementById("btn").style.display = "none";

// Play music
let music = document.getElementById("music");
music.play();

const lines = [
"Hey... just a small thing for you 😊",

"Good morning Veda ☀️",

"Just wanted to say… you’re actually a really good human being.",
"The way you are, it’s rare.",

"And honestly, you're already perfect the way you are,",
"you don’t have to overthink everything.",

"There’s something about your vibe,",
"it’s calm… and kinda addictive 😌",

"And yeah…",

'✨ <span class="highlight">Keep smiling</span> ✨',

"Because your smile is honestly more precious than you think.",

"Have a really good day 🌸"
];

let container = document.getElementById("text");

lines.forEach((line, index) => {
  let p = document.createElement("p");
  p.innerHTML = line;
  container.appendChild(p);

  setTimeout(() => {
    p.classList.add("show");
  }, index * 800);
});

// Floating hearts
for(let i=0;i<15;i++){
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.animationDuration = (3 + Math.random()*3) + "s";
  document.body.appendChild(heart);
}
}
</script>

</body>
</html>
