<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🌸</title>

<style>
body {
  margin:0;
  padding:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #ffd6e0, #ffe6f0);
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
}

.box {
  background:white;
  padding:35px;
  border-radius:20px;
  width:80%;
  max-width:400px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2 {
  color:#ff4d88;
}

p {
  color:#444;
  font-size:16px;
  line-height:1.8;
  opacity:0;
  transition: opacity 1s ease;
}

button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#ff4d88;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.heart {
  font-size:22px;
  margin-top:10px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<div class="box">
  <h2>Good Morning ☀️</h2>

  <p id="text">Click below...</p>

  <button onclick="showMessage()">Open 💌</button>

  <div class="heart">❤️</div>
</div>

<script>
function showMessage() {

let message = `Hey... just a small thing for you 😊<br><br>

I hope you woke up feeling a little lighter today.<br>
And even if you didn't, it's okay...<br><br>

Just don't overthink too much, alright?<br>
Everything doesn't need to be figured out at once.<br><br>

And one more thing...<br><br>

✨ <span style="color:#ff4d88;font-weight:bold;">Keep smiling</span> ✨<br><br>

Because your smile is honestly more precious than you think.<br><br>

Take your time, take care of yourself,<br>
and I hope your day goes really well 🌸`;

let i = 0;
let speed = 20;

let textElement = document.getElementById("text");
textElement.innerHTML = "";
textElement.style.opacity = 1;

function typeWriter() {
  if (i < message.length) {
    textElement.innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}

typeWriter();
}
</script>

</body>
</html>
