<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🌸</title>

<style>
body {
  margin:0;
  padding:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #ffd6e0, #ffe6f0);
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
}

.box {
  background:white;
  padding:35px;
  border-radius:20px;
  width:80%;
  max-width:400px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2 {
  color:#ff4d88;
}

#text p {
  opacity:0;
  transform: translateY(10px);
  transition: all 0.5s ease;
  margin:10px 0;
  color:#444;
  line-height:1.6;
}

.show {
  opacity:1 !important;
  transform: translateY(0) !important;
}

.highlight {
  color:#ff4d88;
  font-weight:bold;
}

button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#ff4d88;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.heart {
  font-size:22px;
  margin-top:10px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<div class="box">
  <h2>Good Morning ☀️</h2>

  <div id="text"></div>

  <button onclick="showMessage()">Open 💌</button>

  <div class="heart">❤️</div>
</div>

<script>
function showMessage() {

const lines = [
"Hey... just a small thing for you 😊",

"I hope you woke up feeling a little lighter today.",
"And even if you didn't, it's okay...",

"Just don't overthink too much, alright?",
"Everything doesn't need to be figured out at once.",

"And one more thing...",

'✨ <span class="highlight">Keep smiling</span> ✨',

"Because your smile is honestly more precious than you think.",

"Take your time, take care of yourself,",
"and I hope your day goes really well 🌸"
];

let container = document.getElementById("text");
container.innerHTML = "";

lines.forEach((line, index) => {
  let p = document.createElement("p");
  p.innerHTML = line;
  container.appendChild(p);

  setTimeout(() => {
    p.classList.add("show");
  }, index * 700);
});

}
</script>

</body>
</html>
