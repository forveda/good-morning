body {
  margin:0;

  height:100vh;
  display:flex;

  background: linear-gradient(-45deg, #ffd6e0, #ffe6f0, #ffd1dc, #ffe4ec);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  overflow:hidden;
}

@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.box {
  background:white;
  padding:30px;
  border-radius:20px;
  width:85%;
  max-width:420px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  z-index:2;
}

h2 {
  color:#ff4d88;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #ff99bb; }
  to { text-shadow: 0 0 15px #ff4d88; }
}

#text p {
  opacity:0;
  transform: translateY(15px);
  transition: all 0.6s ease;
  margin:12px 0;
  color:#444;
  line-height:1.7;
}

.show {
  opacity:1 !important;
  transform: translateY(0) !important;
}

.highlight {
  color:#ff4d88;
  font-weight:bold;
  font-size:18px;
}

button {
  margin-top:12px;
  padding:10px 20px;
  border:none;
  background:#ff4d88;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}

button:hover {
  transform: scale(1.05);
}

.heart {
  position:absolute;
  color:#ff4d88;
  font-size:20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

img {
  width:90px;
  margin-bottom:10px;
  border-radius:12px;
}
</style>

</head>
